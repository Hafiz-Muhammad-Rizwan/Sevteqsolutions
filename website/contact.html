<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact — Sevteq</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="container">
    <a class="logo" href="index.html">Sevteq</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>Contact Us</h1>
    <p>Get in touch with our team</p>
  </div>
</section>

<section class="contact-section">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-info">
        <h2>Get in Touch</h2>
        <p>Have a project in mind or want to discuss potential collaboration? We'd love to hear from you!</p>
        
        <div class="contact-method">
          <i class="fas fa-envelope"></i>
          <div>
            <h3>Email Us</h3>
            <p>sevteqsolutions@outlook.com</p>
          </div>
        </div>
      </div>

      <form class="contact-form" action="https://formsubmit.co/sevteqsolutions@outlook.com" method="POST">
        <!-- Honeypot -->
        <input type="text" name="_honey" style="display:none">
        <!-- Disable Captcha -->
        <input type="hidden" name="_captcha" value="false">
        <!-- Success Page -->
        <input type="hidden" name="_next" value="thank-you.html">
        <!-- Email Subject -->
        <input type="hidden" name="_subject" value="New Contact Form Submission!">
        
        <div class="form-group">
          <input type="text" name="name" placeholder="Your Name" required>
        </div>
        
        <div class="form-group">
          <input type="email" name="email" placeholder="Your Email" required>
        </div>
        
        <div class="form-group">
          <input type="text" name="subject" placeholder="Subject" required>
        </div>
        
        <div class="form-group">
          <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
        </div>
        
        <button type="submit" class="btn-primary">Send Message</button>
      </form>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <p> 2026 Sevteq. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
